name: Release Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and push Dev image
        id: build
        uses: QRify-platform/github-actions/docker-build-push@main
        with:
          image-name: {{SERVICE_NAME}}-dev
          aws-role-to-assume: ${{ vars.AWS_ECR_ROLE_TO_ASSUME }}
          aws-region: us-east-2
          ecr-registry: ${{ vars.AWS_ECR_REGISTRY }}

      # After you add Helm values under apps/{{SERVICE_NAME}}/ in cluster-state:
      # - name: Update image tag in cluster-state
      #   uses: QRify-platform/github-actions/update-app-tag@main
      #   with:
      #     image-tag: ${{ steps.build.outputs.tag }}
      #     github-token: ${{ secrets.CLUSTER_STATE_PAT }}
      #     cluster-repo: QRify-platform/cluster-state
      #     values-file-path: apps/{{SERVICE_NAME}}/values.dev.yaml
