name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Push to main → deploy dev only.
# Actions → Release → Run workflow → build + deploy dev, then promote same tag to prod.

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.build.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Build and push Dev image
        id: build
        uses: QRify-platform/github-actions/docker-build-push@main
        with:
          image-name: {{SERVICE_NAME}}-dev
          aws-role-to-assume: ${{ vars.AWS_ECR_ROLE_TO_ASSUME || 'arn:aws:iam::856096729725:role/QRifyECRPushRole' }}
          aws-region: us-east-2
          ecr-registry: ${{ vars.AWS_ECR_REGISTRY || '856096729725.dkr.ecr.us-east-2.amazonaws.com' }}

      - name: Point cluster-state dev at new tag
        uses: QRify-platform/github-actions/update-app-tag@main
        with:
          image-tag: ${{ steps.build.outputs.tag }}
          github-token: ${{ secrets.CLUSTER_STATE_PAT }}
          cluster-repo: QRify-platform/cluster-state
          values-file-path: apps/{{SERVICE_NAME}}/values.dev.yaml

  promote-prod:
    needs: deploy-dev
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Promote image to prod ECR repo
        uses: QRify-platform/github-actions/ecr-retag@main
        with:
          source-image-name: {{SERVICE_NAME}}-dev
          target-image-name: {{SERVICE_NAME}}-prod
          image-tag: ${{ needs.deploy-dev.outputs.tag }}
          aws-role-to-assume: ${{ vars.AWS_ECR_ROLE_TO_ASSUME || 'arn:aws:iam::856096729725:role/QRifyECRPushRole' }}
          aws-region: us-east-2
          ecr-registry: ${{ vars.AWS_ECR_REGISTRY || '856096729725.dkr.ecr.us-east-2.amazonaws.com' }}

      - name: Point cluster-state prod at promoted tag
        uses: QRify-platform/github-actions/update-app-tag@main
        with:
          image-tag: ${{ needs.deploy-dev.outputs.tag }}
          github-token: ${{ secrets.CLUSTER_STATE_PAT }}
          cluster-repo: QRify-platform/cluster-state
          values-file-path: apps/{{SERVICE_NAME}}/values.prod.yaml
