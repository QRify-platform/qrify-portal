name: Scaffold Service

# Onboards a service:
# 1) GitHub app repo from templates/{stack}
# 2) ECR {name}-dev / {name}-prod
# 3) cluster-state Helm app + app-of-apps entries

on:
  workflow_dispatch:
    inputs:
      name:
        description: Service / repo name (kebab-case)
        required: true
        type: string
      stack:
        description: Runtime stack
        required: true
        type: choice
        options:
          - nodejs
          - python
      description:
        description: Short repo description
        required: false
        type: string
        default: ''

concurrency:
  group: scaffold-${{ inputs.name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout portal (templates + script)
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: QRify-platform/github-actions/aws-oidc@main
        with:
          aws-role-to-assume: ${{ vars.AWS_ECR_ROLE_TO_ASSUME || 'arn:aws:iam::856096729725:role/QRifyECRPushRole' }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-2' }}

      - name: Scaffold service
        env:
          GH_TOKEN: ${{ secrets.SCAFFOLD_GITHUB_TOKEN }}
          ORG: ${{ vars.GITHUB_ORG || 'QRify-platform' }}
          NAME: ${{ inputs.name }}
          STACK: ${{ inputs.stack }}
          DESCRIPTION: ${{ inputs.description }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}
        run: bash scripts/scaffold-service.sh
